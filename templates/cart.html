
<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
</head>
<body>

<h2>Your Cart</h2>

{% for item in cart %}
<p>{{ item[1] }} - ₹{{ item[2] }}</p>
{% endfor %}

<h3>Total: ₹{{ total }}</h3>

<form action="/checkout" method="POST">
    <input type="radio" name="payment" value="COD"> COD<br>
    <input type="radio" name="payment" value="QR"> QR Payment<br><br>
    <button>Checkout</button>
</form>

</body>
</html>
