<!DOCTYPE html>
<html>
<head>
    <title>Bhagwat Stationery</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f8;
        }

        .navbar {
            background: #1f2937;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            margin-left: 10px;
            text-decoration: none;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card img {
            width: 120px;
            height: 120px;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            background: #2563eb;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div><b>📚 Bhagwat Stationery</b></div>
    <div>
        <a href="/">Home</a>
        <a href="/cart">Cart</a>
        <a href="/admin">Admin</a>
    </div>
</div>

<h2 style="text-align:center;">✨ Stationery Store ✨</h2>

<div class="container">

{% for product in products %}
<div class="card">

    <img src="{{ product['image'] }}">

    <h3>{{ product['name'] }}</h3>

    <p class="price">₹{{ product['price'] }}</p>

    <a href="/add/{{ product['id'] }}">
        <button>Add to Cart</button>
    </a>

</div>
{% endfor %}

</div>

</body>
</html>
